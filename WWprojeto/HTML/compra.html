<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WalkWord - Finalizar Compra</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;500;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    
    <link rel="stylesheet" href="../CSS/favoritos.css" />
    <link rel="stylesheet" href="../CSS/compra.css" />
</head>
<body>

   <header>
      <a href="../HTML/mainpage.html" class="logo">WalkWord</a>

      <nav>
        <ul>
          <li><a href="../HTML/catalogo.html" class="ativo">Catalog</a></li>
          <li><a href="../HTML/newin.html">New in</a></li>
          <li><a href="../HTML/storie.html">Stories</a></li>
          <li><a href="../HTML/abtus.html">About</a></li>
        </ul>
      </nav>

      <div class="icones">
        <a href="../HTML/carrinho.html">
          <img src="../assets/shopping-cart.png" alt="Carrinho">
        </a>
        <a href="../HTML/perfil.html">
          <img src="../assets/pessoa.png" alt="Perfil">
        </a>
      </div>
    </header>

    <main class="checkout-main">
        
        <div class="checkout-steps">
            <div class="step completed">
                <span class="material-symbols-outlined">check</span>
                IDENTIFICAÇÃO
            </div>
            <div class="step active">
                ENTREGA
            </div>
            <div class="step pending">
                PAGAMENTO
            </div>
        </div>

        <div class="checkout-container">
            
            <aside class="user-info-column" id="userInfoBox">
                <p id="userEmail" class="info-text">carregando...</p>
                <p id="userName" class="info-subtext">Usuário WalkWord</p>
            </aside>

            <section class="address-form-column">
                <h2 class="section-title">NOVO ENDEREÇO</h2>
                
                <form id="checkoutForm" class="checkout-form">
                    <div class="input-group full-width">
                        <label for="cep">CEP*</label>
                        <input type="text" id="cep" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="endereco">Endereço*</label>
                        <input type="text" id="endereco" required>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="numero">Número*</label>
                            <input type="text" id="numero" required>
                        </div>
                        <div class="input-group">
                            <label for="complemento">Complemento (opcional)</label>
                            <input type="text" id="complemento">
                        </div>
                    </div>

                    <div class="input-group full-width">
                        <label for="bairro">Bairro*</label>
                        <input type="text" id="bairro" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="cidade">Cidade*</label>
                        <input type="text" id="cidade" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="estado">Estado*</label>
                        <input type="text" id="estado" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="referencia">Ponto de referência (opcional)</label>
                        <input type="text" id="referencia">
                    </div>

                    <div class="form-actions">
                        <a href="carrinho.html" class="btn-outline">CANCELAR</a>
                        <button type="submit" class="btn-primary">IR PARA PAGAMENTO</button>
                    </div>
                </form>
            </section>

            <aside class="summary-column">
                <div class="cart-summary">
                    <h3>RESUMO DA COMPRA</h3>
                    
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">$0.00</span>
                    </div>
                    
                    <div class="summary-row cupom-row">
                        <span>Cupom</span>
                        <span class="material-symbols-outlined">add_circle</span>
                    </div>
                    
                    <div class="summary-row total checkout-total-row">
                        <span style="display: flex; align-items: center; gap: 0.5rem;">
                            <span class="material-symbols-outlined">shopping_bag</span>
                            Total
                        </span>
                        <span id="checkout-total">$0.00</span>
                    </div>
                </div>

                <div class="info-box">
                    <span class="info-highlight">Troca fácil.</span> Troque seus produtos WalkWord em até 30 dias.
                    <span class="material-symbols-outlined info-icon">info</span>
                </div>
            </aside>

        </div>
    </main>

    <script src="js/compra.js"></script>
</body>
</html>
