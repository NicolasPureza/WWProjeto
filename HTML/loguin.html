<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | WalkWord</title>
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="../HTML/login.html">
</head>
<body>

<main class="login-container">
    <section class="left-panel">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJ9HL9BcA67W5n-NAsxu74XAF6ynAkdtIiTJCyC8gwP6f5NwYv0pKVwrtarZnEYUJ-BSivtmyX01BUvQw4wu4e3n1eep1YVp-u_OdvvLqAQUlngYtnm53Mk7ga000b12MurIvtuGwC-wKMAmT-A6rbepFPxSFmtZRk-0dc85gUQSYaUAayogiPK3flp5LV298Ii3mjZZ_o46-SS2xadCsUV894yzKp4jKnKDaB7RthZiD3eixleVXr8EwL1t92FKjajhCM56QuDM9V" alt="Minimalist Atelier" class="bg-image">
        <div class="overlay"></div>
        <div class="content-left">
            <p class="subtitle">The Conscious Curator</p>
            <h2 class="hero-text">Archiving beauty, <br>sustaining heritage.</h2>
        </div>
    </section>
    <section class="right-panel">
        <div class="form-wrapper">
            <div class="brand">
                <h1 class="brand-name">WalkWord</h1>
                <div class="brand-line"></div>
            </div>

            <div class="welcome-header">
                <h3>Welcome back</h3>
                <p>Enter your credentials to access your curated archive and atelier orders.</p>
            </div>

            <form class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="alex@atelier.com">
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-grid">
                <button class="btn-social">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
                    Google
                </button>
                <button class="btn-social">
                    <svg class="icon" fill="currentColor" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.75 1.18-.02 2.31-.93 3.81-.84 1.53.09 2.69.74 3.42 1.84-3.15 1.88-2.64 6.2.57 7.55-.66 1.65-1.55 3.27-2.88 4.67zM12.03 7.25c-.02-2.23 1.76-4.07 3.9-4.14.3.2.3.2.4.4.15 2.33-1.92 4.14-3.9 3.9-.15-.1-.28-.15-.4-.16z"></path></svg>
                    Apple
                </button>
            </div>

            <p class="signup-text">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </div>
    </section>
</main>

<div class="floating-badge">
    <span class="material-symbols-outlined">energy_savings_leaf</span>
    <span class="badge-text">SUSTAINABILITY FIRST</span>
</div>
<script src="js/loguin.js"></script>
</body>
</html>
